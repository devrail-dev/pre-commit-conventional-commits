name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: make check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run make check
        run: |
          docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            ghcr.io/devrail-dev/dev-toolchain:v1 \
            make _check

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            ghcr.io/devrail-dev/dev-toolchain:v1 \
            gitleaks detect --source /workspace --verbose
